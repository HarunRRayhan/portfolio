name: Blue-Green Deployment

on:
  push:
    branches: [ main, master, development, features/cicd ]
  pull_request:
    types: [ closed ]
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - development

# Environment variables available to all jobs
env:
  # Default environment
  ENVIRONMENT: ${{ github.event.inputs.environment || 'production' }}
  # Deployment timestamp for unique container names
  DEPLOY_TIMESTAMP: ${{ github.run_id }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    # Only run on PR merge or direct push to main
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    environment: ${{ github.event.inputs.environment || 'production' }}

    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Validate required secrets
        run: |
          echo "Checking for required secrets in environment: ${{ env.ENVIRONMENT }}"
          
          # Use a more robust approach to check for secrets
          # This will help identify which secrets are missing without failing immediately
          missing_secrets=""
          
          # Function to check if a secret exists
          check_secret() {
            local secret_name=$1
            local secret_value=$2
            
            if [ -z "$secret_value" ]; then
              echo "⚠️ Missing secret: $secret_name"
              return 1
            else
              echo "✅ Found secret: $secret_name"
              return 0
            fi
          }
          
          # Check each required secret
          check_secret "REMOTE_HOST" "${{ secrets.REMOTE_HOST }}" || missing_secrets="$missing_secrets REMOTE_HOST"
          check_secret "REMOTE_USER" "${{ secrets.REMOTE_USER }}" || missing_secrets="$missing_secrets REMOTE_USER"
          check_secret "SSH_PRIVATE_KEY" "${{ secrets.SSH_PRIVATE_KEY }}" || missing_secrets="$missing_secrets SSH_PRIVATE_KEY"
          check_secret "APP_DIR" "${{ secrets.APP_DIR }}" || missing_secrets="$missing_secrets APP_DIR"
          check_secret "POSTGRES_DB" "${{ secrets.POSTGRES_DB }}" || missing_secrets="$missing_secrets POSTGRES_DB"
          check_secret "POSTGRES_USER" "${{ secrets.POSTGRES_USER }}" || missing_secrets="$missing_secrets POSTGRES_USER"
          check_secret "POSTGRES_PASSWORD" "${{ secrets.POSTGRES_PASSWORD }}" || missing_secrets="$missing_secrets POSTGRES_PASSWORD"
          check_secret "APP_KEY" "${{ secrets.APP_KEY }}" || missing_secrets="$missing_secrets APP_KEY"
          check_secret "APP_URL" "${{ secrets.APP_URL }}" || missing_secrets="$missing_secrets APP_URL"
          
          # Check if we have any missing secrets
          if [ ! -z "$missing_secrets" ]; then
            echo "❌ Missing required secrets:$missing_secrets"
            exit 1
          else
            echo "✅ All required secrets are present."
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build assets
        run: npm run build

      - name: Create deployment
        id: deployment
        uses: chrnorm/deployment-action@v2
        with:
          token: "${{ github.token }}"
          environment: ${{ env.ENVIRONMENT }}
          initial_status: "in_progress"

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
          log-public-key: true
      
      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -t rsa ${{ secrets.REMOTE_HOST }} >> ~/.ssh/known_hosts
      
      - name: Deploy to Server
        id: deploy
        env:
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
          APP_DIR: ${{ secrets.APP_DIR }}
          # Database credentials
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          # Cloudflare credentials
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          # R2 storage credentials
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_S3_ENDPOINT: ${{ secrets.R2_S3_ENDPOINT }}
          # Laravel application settings
          APP_NAME: ${{ secrets.APP_NAME }}
          APP_ENV: ${{ env.ENVIRONMENT }}
          APP_KEY: ${{ secrets.APP_KEY }}
          APP_DEBUG: ${{ env.ENVIRONMENT == 'production' && 'false' || 'true' }}
          APP_URL: ${{ secrets.APP_URL }}
          # Deployment settings
          GITHUB_ACTIONS: "true"
          DEPLOY_TIMESTAMP: ${{ env.DEPLOY_TIMESTAMP }}
        run: |
          
          # Create a temporary .env file for deployment
          cat > .env.deploy << EOF
          REMOTE_HOST=$REMOTE_HOST
          REMOTE_USER=$REMOTE_USER
          APP_DIR=$APP_DIR
          
          # Database credentials
          POSTGRES_DB=$POSTGRES_DB
          POSTGRES_USER=$POSTGRES_USER
          POSTGRES_PASSWORD=$POSTGRES_PASSWORD
          
          # Cloudflare credentials
          CLOUDFLARE_API_TOKEN=$CLOUDFLARE_API_TOKEN
          CLOUDFLARE_ZONE_ID=$CLOUDFLARE_ZONE_ID
          
          # R2 storage credentials
          R2_ACCESS_KEY_ID=$R2_ACCESS_KEY_ID
          R2_SECRET_ACCESS_KEY=$R2_SECRET_ACCESS_KEY
          R2_BUCKET_NAME=$R2_BUCKET_NAME
          R2_S3_ENDPOINT=$R2_S3_ENDPOINT
          
          # Laravel application settings
          APP_NAME=$APP_NAME
          APP_ENV=$APP_ENV
          APP_KEY=$APP_KEY
          APP_DEBUG=$APP_DEBUG
          APP_URL=$APP_URL
          
          # Deployment settings
          GITHUB_ACTIONS=true
          DEPLOY_TIMESTAMP=$DEPLOY_TIMESTAMP
          EOF
          
          # Create a directory for the build assets
          mkdir -p public/build
          
          # Copy deployment files to the server
          echo "Copying deployment files to server..."
          scp -o StrictHostKeyChecking=no -r deploy/* $REMOTE_USER@$REMOTE_HOST:$APP_DIR/
          scp -o StrictHostKeyChecking=no -r public/build $REMOTE_USER@$REMOTE_HOST:$APP_DIR/public/
          scp -o StrictHostKeyChecking=no .env.deploy $REMOTE_USER@$REMOTE_HOST:$APP_DIR/.env.deploy
          
          # Execute blue-green deployment script
          echo "Executing blue-green deployment script..."
          ssh -o StrictHostKeyChecking=no $REMOTE_USER@$REMOTE_HOST "cd $APP_DIR && chmod +x ./cicd/blue-green-deploy.sh && ./cicd/blue-green-deploy.sh"
          
          # Verify deployment
          echo "Verifying deployment..."
          CONTAINER_CHECK=$(ssh -o StrictHostKeyChecking=no $REMOTE_USER@$REMOTE_HOST "if [ -f /bin/docker ]; then /bin/docker ps | grep portfolio-app | wc -l; elif [ -f /usr/bin/docker ]; then /usr/bin/docker ps | grep portfolio-app | wc -l; elif [ -f /usr/local/bin/docker ]; then /usr/local/bin/docker ps | grep portfolio-app | wc -l; else echo 0; fi")
          if [ "$CONTAINER_CHECK" -gt "0" ]; then
            echo "✅ Container is running - deployment successful!"
            echo "::set-output name=status::success"
          else
            echo "❌ Container is not running - deployment failed."
            echo "::set-output name=status::failure"
            exit 1
          fi

      - name: Upload assets to R2 Storage
        if: steps.deploy.outputs.status == 'success'
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_S3_ENDPOINT: ${{ secrets.R2_S3_ENDPOINT }}
        run: |
          # Set up AWS CLI
          echo "Setting up AWS CLI..."
          if aws --version &>/dev/null; then
            echo "AWS CLI is already installed. Using existing installation."
          else
            echo "Installing AWS CLI..."
            curl -s "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
            unzip -q awscliv2.zip
            sudo ./aws/install --update
          fi
          
          # Set AWS credentials
          export AWS_ACCESS_KEY_ID="${R2_ACCESS_KEY_ID}"
          export AWS_SECRET_ACCESS_KEY="${R2_SECRET_ACCESS_KEY}"
          
          # Ensure the endpoint URL has a scheme
          ENDPOINT="${R2_S3_ENDPOINT}"
          if [[ ! "$ENDPOINT" =~ ^https?:// ]]; then
            ENDPOINT="https://$ENDPOINT"
          fi
          
          # Upload build assets to R2
          echo "Uploading build assets to R2 Storage..."
          aws s3 sync public/build/ s3://${R2_BUCKET_NAME}/build/ --endpoint-url $ENDPOINT --acl public-read
          
          if [ $? -eq 0 ]; then
            echo "✅ Successfully uploaded assets to R2 Storage"
          else
            echo "⚠️ Failed to upload assets to R2 Storage"
            # Don't fail the build for this step
          fi

      - name: Purge Cloudflare Cache
        if: steps.deploy.outputs.status == 'success'
        env:
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          echo "Purging Cloudflare cache..."
          RESULT=$(curl -s -X POST "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}')
          
          # Check if the purge was successful
          if echo "$RESULT" | grep -q '"success":true'; then
            echo "✅ Cloudflare cache purged successfully"
          else
            echo "⚠️ Cloudflare cache purge may have failed. Response: $RESULT"
            # Don't fail the build for this step
          fi

      - name: Update deployment status
        if: always()
        uses: chrnorm/deployment-status@v2
        with:
          token: "${{ github.token }}"
          state: ${{ steps.deploy.outputs.status == 'success' && 'success' || 'failure' }}
          deployment-id: ${{ steps.deployment.outputs.deployment_id }}

      - name: Notify Deployment Status
        if: always()
        run: |
          if [ "${{ steps.deploy.outputs.status }}" == "success" ]; then
            echo "🎉 Blue-Green Deployment completed successfully!"
            echo "Environment: ${{ github.event.inputs.environment || 'production' }}"
            echo "Branch: ${{ github.ref_name }}"
            echo "Commit: ${{ github.sha }}"
          else
            echo "❌ Blue-Green Deployment failed!"
            echo "Environment: ${{ github.event.inputs.environment || 'production' }}"
            echo "Branch: ${{ github.ref_name }}"
            echo "Commit: ${{ github.sha }}"
          fi
