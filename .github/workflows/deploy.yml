name: CI/CD Pipeline

on:
  push:
    branches: [ main, master, development, features/cicd ]
  pull_request:
    types: [ closed ]
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - development

# Environment variables available to all jobs
env:
  # Default environment
  ENVIRONMENT: ${{ github.event.inputs.environment || 'production' }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    # Only run on PR merge or direct push to main
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    environment: ${{ github.event.inputs.environment || 'production' }}

    permissions:
      contents: read
      deployments: write

    steps:
      - name: Validate required secrets
        run: |
          echo "Checking for required secrets in environment: ${{ env.ENVIRONMENT }}"
          
          # Use a more robust approach to check for secrets
          # This will help identify which secrets are missing without failing immediately
          missing_secrets=""
          
          # Function to check if a secret exists
          check_secret() {
            local secret_name=$1
            local secret_value=$2
            
            if [ -z "$secret_value" ]; then
              echo "⚠️ Missing secret: $secret_name"
              return 1
            else
              echo "✅ Found secret: $secret_name"
              return 0
            fi
          }
          
          # Check each required secret
          check_secret "REMOTE_HOST" "${{ secrets.REMOTE_HOST }}" || missing_secrets="$missing_secrets REMOTE_HOST"
          check_secret "REMOTE_USER" "${{ secrets.REMOTE_USER }}" || missing_secrets="$missing_secrets REMOTE_USER"
          check_secret "APP_DIR" "${{ secrets.APP_DIR }}" || missing_secrets="$missing_secrets APP_DIR"
          check_secret "SSH_PRIVATE_KEY" "${{ secrets.SSH_PRIVATE_KEY }}" || missing_secrets="$missing_secrets SSH_PRIVATE_KEY"
          check_secret "R2_BUCKET_NAME" "${{ secrets.R2_BUCKET_NAME }}" || missing_secrets="$missing_secrets R2_BUCKET_NAME"
          check_secret "R2_S3_ENDPOINT" "${{ secrets.R2_S3_ENDPOINT }}" || missing_secrets="$missing_secrets R2_S3_ENDPOINT"
          check_secret "R2_ACCESS_KEY_ID" "${{ secrets.R2_ACCESS_KEY_ID }}" || missing_secrets="$missing_secrets R2_ACCESS_KEY_ID"
          check_secret "R2_SECRET_ACCESS_KEY" "${{ secrets.R2_SECRET_ACCESS_KEY }}" || missing_secrets="$missing_secrets R2_SECRET_ACCESS_KEY"
          check_secret "CLOUDFLARE_ZONE_ID" "${{ secrets.CLOUDFLARE_ZONE_ID }}" || missing_secrets="$missing_secrets CLOUDFLARE_ZONE_ID"
          check_secret "CLOUDFLARE_API_TOKEN" "${{ secrets.CLOUDFLARE_API_TOKEN }}" || missing_secrets="$missing_secrets CLOUDFLARE_API_TOKEN"
          check_secret "POSTGRES_DB" "${{ secrets.POSTGRES_DB }}" || missing_secrets="$missing_secrets POSTGRES_DB"
          check_secret "POSTGRES_USER" "${{ secrets.POSTGRES_USER }}" || missing_secrets="$missing_secrets POSTGRES_USER"
          check_secret "POSTGRES_PASSWORD" "${{ secrets.POSTGRES_PASSWORD }}" || missing_secrets="$missing_secrets POSTGRES_PASSWORD"
          
          if [ ! -z "$missing_secrets" ]; then
            echo "::error::Missing required secrets:$missing_secrets"
            echo "Please add these secrets to the repository settings or environment."
            echo "Go to Settings > Secrets and variables > Actions > New repository secret"
            exit 1
          else
            echo "All required secrets are present."
          fi

      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
        
      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
          log-public-key: true
      
      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.REMOTE_HOST }} >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
        env:
          NODE_ENV: production

      - name: Setup SSH key
        id: ssh-setup
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Verify SSH key setup
        run: |
          if ! ssh-add -l &>/dev/null; then
            echo "::error::SSH key was not added correctly. Please check your SSH_PRIVATE_KEY secret."
            exit 1
          else
            echo "SSH key successfully added."
          fi

      - name: Add host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -t rsa ${{ secrets.REMOTE_HOST }} >> ~/.ssh/known_hosts

      - name: Validate required secrets
        run: |
          missing_secrets=""

          # Check for required secrets
          [[ -z "${{ secrets.REMOTE_HOST }}" ]] && missing_secrets="$missing_secrets REMOTE_HOST"
          [[ -z "${{ secrets.REMOTE_USER }}" ]] && missing_secrets="$missing_secrets REMOTE_USER"
          [[ -z "${{ secrets.APP_DIR }}" ]] && missing_secrets="$missing_secrets APP_DIR"
          [[ -z "${{ secrets.SSH_PRIVATE_KEY }}" ]] && missing_secrets="$missing_secrets SSH_PRIVATE_KEY"
          [[ -z "${{ secrets.R2_BUCKET_NAME }}" ]] && missing_secrets="$missing_secrets R2_BUCKET_NAME"
          [[ -z "${{ secrets.R2_S3_ENDPOINT }}" ]] && missing_secrets="$missing_secrets R2_S3_ENDPOINT"
          [[ -z "${{ secrets.R2_ACCESS_KEY_ID }}" ]] && missing_secrets="$missing_secrets R2_ACCESS_KEY_ID"
          [[ -z "${{ secrets.R2_SECRET_ACCESS_KEY }}" ]] && missing_secrets="$missing_secrets R2_SECRET_ACCESS_KEY"
          [[ -z "${{ secrets.CLOUDFLARE_ZONE_ID }}" ]] && missing_secrets="$missing_secrets CLOUDFLARE_ZONE_ID"
          [[ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]] && missing_secrets="$missing_secrets CLOUDFLARE_API_TOKEN"
          [[ -z "${{ secrets.POSTGRES_DB }}" ]] && missing_secrets="$missing_secrets POSTGRES_DB"
          [[ -z "${{ secrets.POSTGRES_USER }}" ]] && missing_secrets="$missing_secrets POSTGRES_USER"
          [[ -z "${{ secrets.POSTGRES_PASSWORD }}" ]] && missing_secrets="$missing_secrets POSTGRES_PASSWORD"

          if [[ ! -z "$missing_secrets" ]]; then
            echo "::error::Missing required secrets:$missing_secrets"
            exit 1
          else
            echo "All required secrets are present."
          fi

      - name: Deploy to server
        env:
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
          APP_DIR: ${{ secrets.APP_DIR }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_S3_ENDPOINT: ${{ secrets.R2_S3_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          DEPLOYMENT_ENV: ${{ github.event.inputs.environment || 'production' }}
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          # Use existing AWS CLI or update if needed
          echo "Setting up AWS CLI..."
          if aws --version &>/dev/null; then
            echo "AWS CLI is already installed. Using existing installation."
          else
            echo "Installing AWS CLI..."
            curl -s "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
            unzip -q awscliv2.zip
            sudo ./aws/install --update
          fi

          # Set AWS credentials
          export AWS_ACCESS_KEY_ID="${R2_ACCESS_KEY_ID}"
          export AWS_SECRET_ACCESS_KEY="${R2_SECRET_ACCESS_KEY}"

          # Function to handle errors and reduce output verbosity
          upload_to_s3() {
            local source=$1
            local dest=$2
            local content_type=$3
            local options="--endpoint-url \"${R2_S3_ENDPOINT}\" --acl public-read --no-progress --size-only"
            
            if [ ! -z "$content_type" ]; then
              options="$options --content-type \"$content_type\""
            fi
            
            echo "Uploading $source to $dest (only if missing or updated)"
            if eval "aws s3 sync $source $dest $options --delete" &>/dev/null; then
              echo "✅ Successfully synced $source to $dest"
              return 0
            else
              echo "❌ Failed to sync $source to $dest"
              return 1
            fi
          }
          
          # Upload build assets with reduced verbosity
          echo "Uploading static assets to Cloudflare R2..."
          
          # Upload build assets
          upload_to_s3 "./public/build" "s3://${R2_BUCKET_NAME}/build" || exit 1
          
          # Set content types for JS and CSS files
          echo "Setting content types for JS files..."
          find ./public/build -name "*.js" -type f | while read -r file; do
            relative_path="${file#./public/}"
            # Check if file exists and needs updating (using size comparison)
            if ! aws s3 ls "s3://${R2_BUCKET_NAME}/${relative_path}" --endpoint-url "${R2_S3_ENDPOINT}" &>/dev/null || \
               [ $(stat -c%s "$file") != $(aws s3api head-object --bucket "${R2_BUCKET_NAME}" --key "${relative_path}" --endpoint-url "${R2_S3_ENDPOINT}" --query 'ContentLength' --output text 2>/dev/null || echo 0) ]; then
              echo "Updating JS file: ${relative_path}"
              aws s3 cp "$file" "s3://${R2_BUCKET_NAME}/${relative_path}" --endpoint-url "${R2_S3_ENDPOINT}" --content-type "application/javascript" --acl public-read --no-progress &>/dev/null
            fi
          done
          
          echo "Setting content types for CSS files..."
          find ./public/build -name "*.css" -type f | while read -r file; do
            relative_path="${file#./public/}"
            # Check if file exists and needs updating (using size comparison)
            if ! aws s3 ls "s3://${R2_BUCKET_NAME}/${relative_path}" --endpoint-url "${R2_S3_ENDPOINT}" &>/dev/null || \
               [ $(stat -c%s "$file") != $(aws s3api head-object --bucket "${R2_BUCKET_NAME}" --key "${relative_path}" --endpoint-url "${R2_S3_ENDPOINT}" --query 'ContentLength' --output text 2>/dev/null || echo 0) ]; then
              echo "Updating CSS file: ${relative_path}"
              aws s3 cp "$file" "s3://${R2_BUCKET_NAME}/${relative_path}" --endpoint-url "${R2_S3_ENDPOINT}" --content-type "text/css" --acl public-read --no-progress &>/dev/null
            fi
          done
          
          # Upload other static assets
          upload_to_s3 "./public/fonts" "s3://${R2_BUCKET_NAME}/fonts" || exit 1
          upload_to_s3 "./public/images" "s3://${R2_BUCKET_NAME}/images" || exit 1
          
          echo "✅ All static assets uploaded successfully"

          # Create deployment info file
          echo "DEPLOYMENT_ENV=${DEPLOYMENT_ENV}" > deployment_info.txt
          echo "BRANCH_NAME=${BRANCH_NAME}" >> deployment_info.txt
          echo "GITHUB_SHA=${GITHUB_SHA}" >> deployment_info.txt
          echo "GITHUB_RUN_ID=${GITHUB_RUN_ID}" >> deployment_info.txt
          echo "GITHUB_ACTOR=${GITHUB_ACTOR}" >> deployment_info.txt
          echo "DEPLOY_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> deployment_info.txt

          # Create deployment directory on the server if it doesn't exist
          ssh ${REMOTE_USER}@${REMOTE_HOST} "mkdir -p ${APP_DIR}/deploy/cicd"
          
          # Handle local changes on the server by backing them up
          echo "Handling potential local changes on server..."
          ssh ${REMOTE_USER}@${REMOTE_HOST} "cd ${APP_DIR} && if [ -d deploy/cicd ]; then 
            mkdir -p deploy/cicd-backup-$(date +%Y%m%d%H%M%S) 
            cp -r deploy/cicd/* deploy/cicd-backup-$(date +%Y%m%d%H%M%S)/ 2>/dev/null || true
            echo 'Backed up existing deployment scripts'
          fi"
          
          # Copy deployment scripts to the server
          echo "Copying deployment scripts to server..."
          scp -r ./deploy/cicd/* ${REMOTE_USER}@${REMOTE_HOST}:${APP_DIR}/deploy/cicd/
          
          # Copy Docker CI scripts and configuration to the server
          echo "Copying Docker CI scripts and configuration to server..."
          ssh ${REMOTE_USER}@${REMOTE_HOST} "mkdir -p ${APP_DIR}/docker/ci"
          scp -r ./docker/ci/* ${REMOTE_USER}@${REMOTE_HOST}:${APP_DIR}/docker/ci/
          
          # Make scripts executable on the server
          ssh ${REMOTE_USER}@${REMOTE_HOST} "chmod +x ${APP_DIR}/deploy/cicd/*.sh ${APP_DIR}/docker/*.sh 2>/dev/null || true"
          
          # Copy deployment info to server
          scp deployment_info.txt ${REMOTE_USER}@${REMOTE_HOST}:${APP_DIR}/deployment_info.txt

          # Run the zero-downtime deployment script with environment variables
          echo "Starting zero-downtime deployment on remote server..."
          
          # Prepare environment variables for remote execution
          ENV_VARS="GITHUB_ACTIONS=true \
                   DEPLOYMENT_ENV=${DEPLOYMENT_ENV} \
                   BRANCH_NAME=${BRANCH_NAME} \
                   POSTGRES_DB=${POSTGRES_DB} \
                   POSTGRES_USER=${POSTGRES_USER} \
                   POSTGRES_PASSWORD=${POSTGRES_PASSWORD} \
                   R2_BUCKET_NAME=${R2_BUCKET_NAME} \
                   R2_S3_ENDPOINT=${R2_S3_ENDPOINT} \
                   R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID} \
                   R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY} \
                   CLOUDFLARE_ZONE_ID=${CLOUDFLARE_ZONE_ID} \
                   CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN}"
          
          # Create required directories on the server before running the deployment script
          echo "Creating required directories on the server..."
          ssh ${REMOTE_USER}@${REMOTE_HOST} "mkdir -p ${APP_DIR}/deploy/cicd ${APP_DIR}/docker/ci"
          
          # Try to create /opt/deploy with sudo if possible, otherwise use a different approach
          echo "Attempting to create /opt/deploy directory with proper permissions..."
          ssh ${REMOTE_USER}@${REMOTE_HOST} "sudo mkdir -p /opt/deploy/docker && sudo chown -R ${REMOTE_USER}:${REMOTE_USER} /opt/deploy" || {
            echo "Could not create /opt/deploy with sudo, trying alternative approach..."
            # Create a directory in the user's home directory instead
            ssh ${REMOTE_USER}@${REMOTE_HOST} "mkdir -p ~/opt_deploy/docker"
            
            # Update environment variables to use this directory instead
            ENV_VARS="${ENV_VARS} OPT_DEPLOY_DIR=~/opt_deploy"
            
            echo "Will use ~/opt_deploy instead of /opt/deploy"
          }
          
          # Ensure all required directories exist in APP_DIR
          echo "Creating all required directories in ${APP_DIR}..."
          ssh ${REMOTE_USER}@${REMOTE_HOST} "mkdir -p ${APP_DIR}/docker ${APP_DIR}/deploy/cicd ${APP_DIR}/docker/ci"
          
          # Copy Docker CI files
          echo "Copying Docker CI files..."
          # Copy all Docker CI files to the server
          scp -r ${GITHUB_WORKSPACE}/docker/ci/* ${REMOTE_USER}@${REMOTE_HOST}:${APP_DIR}/docker/ci/
          ssh ${REMOTE_USER}@${REMOTE_HOST} "chmod +x ${APP_DIR}/docker/ci/entrypoint.sh ${APP_DIR}/docker/ci/wait-for-db.sh"
          
          # Verify Docker is installed and available
          echo "Verifying Docker installation on the server..."
          ssh ${REMOTE_USER}@${REMOTE_HOST} "if ! command -v docker &> /dev/null; then
            echo 'Docker not found in PATH. Checking common locations...'
            if [ -f /usr/bin/docker ]; then
              echo 'Docker found at /usr/bin/docker'
              export PATH=\"$PATH:/usr/bin\"
            elif [ -f /usr/local/bin/docker ]; then
              echo 'Docker found at /usr/local/bin/docker'
              export PATH=\"$PATH:/usr/local/bin\"
            else
              echo 'WARNING: Docker not found. Please ensure Docker is installed on the server.'
            fi
          else
            echo 'Docker is installed and available in PATH'
          fi"
          
          # Execute deployment script directly on the server instead of piping it
          if ssh ${REMOTE_USER}@${REMOTE_HOST} "export $ENV_VARS && cd ${APP_DIR} && ./deploy/cicd/github-deploy.sh"; then
            echo "✅ Remote deployment completed successfully"
          else
            echo "❌ Remote deployment failed. Check server logs for details."
            exit 1
          fi

      - name: Purge Cloudflare Cache
        if: success()
        env:
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          echo "Purging Cloudflare cache..."
          RESULT=$(curl -s -X POST "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}')
          
          # Check if the purge was successful
          if echo "$RESULT" | grep -q '"success":true'; then
            echo "✅ Cloudflare cache purged successfully"
          else
            echo "⚠️ Cloudflare cache purge may have failed. Response: $RESULT"
            # Don't fail the build for this step
          fi

      # Removed GitHub deployment status actions as they're causing errors

      - name: Notify Deployment Status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "🎉 Deployment completed successfully!"
            echo "Environment: ${{ github.event.inputs.environment || 'production' }}"
            echo "Branch: ${{ github.ref_name }}"
            echo "Commit: ${{ github.sha }}"
          else
            echo "❌ Deployment failed!"
            echo "Environment: ${{ github.event.inputs.environment || 'production' }}"
            echo "Branch: ${{ github.ref_name }}"
            echo "Commit: ${{ github.sha }}"
          fi
