name: Simple Deployment

on:
  push:
    branches: [ main, master, development, features/cicd ]
  pull_request:
    types: [ closed ]
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - development

env:
  ENVIRONMENT: ${{ github.event.inputs.environment || 'production' }}
  DEPLOY_TIMESTAMP: ${{ github.run_id }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    environment: ${{ github.event.inputs.environment || 'production' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build assets
        run: npm run build

      - name: Prepare deployment files
        run: |
          # Create .env file
          cat > .env << EOF
          APP_NAME="${{ secrets.APP_NAME }}"
          APP_ENV=${{ env.ENVIRONMENT }}
          APP_KEY=${{ secrets.APP_KEY }}
          APP_DEBUG=${{ env.ENVIRONMENT == 'production' && 'false' || 'true' }}
          APP_URL=${{ secrets.APP_URL }}
          
          LOG_CHANNEL=stack
          LOG_DEPRECATIONS_CHANNEL=null
          LOG_LEVEL=debug
          
          DB_CONNECTION=pgsql
          DB_HOST=localhost
          DB_PORT=5432
          DB_DATABASE=${{ secrets.POSTGRES_DB }}
          DB_USERNAME=${{ secrets.POSTGRES_USER }}
          DB_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          
          SESSION_DRIVER=file
          SESSION_LIFETIME=120
          
          CACHE_DRIVER=file
          QUEUE_CONNECTION=sync
          
          ASSET_URL=https://cdn.harun.dev
          EOF
          
          # Create a zip file with all necessary files
          zip -r deployment.zip app bootstrap config database lang public resources routes storage tests vendor .env artisan composer.json composer.lock package.json package-lock.json vite.config.js tailwind.config.js postcss.config.js

      - name: Deploy to server
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "deployment.zip"
          target: "/tmp"
          strip_components: 0

      - name: Execute deployment
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Create timestamp for backup
            TIMESTAMP=$(date +%Y%m%d%H%M%S)
            
            # Create backup of current deployment if it exists
            if [ -d "${{ secrets.APP_DIR }}" ]; then
              echo "Creating backup of current deployment..."
              sudo cp -r ${{ secrets.APP_DIR }} ${{ secrets.APP_DIR }}_backup_${TIMESTAMP}
            fi
            
            # Create app directory if it doesn't exist
            sudo mkdir -p ${{ secrets.APP_DIR }}
            
            # Extract the deployment package
            echo "Extracting deployment package..."
            sudo unzip -o /tmp/deployment.zip -d ${{ secrets.APP_DIR }}
            
            # Remove the temporary archive
            rm /tmp/deployment.zip
            
            # Set proper permissions
            echo "Setting permissions..."
            sudo chown -R ${{ secrets.REMOTE_USER }}:www-data ${{ secrets.APP_DIR }}
            sudo chmod -R 775 ${{ secrets.APP_DIR }}
            
            # Set specific directory permissions
            sudo chmod -R 777 ${{ secrets.APP_DIR }}/storage
            sudo chmod -R 777 ${{ secrets.APP_DIR }}/bootstrap/cache
            
            # Restart the web server
            echo "Restarting web server..."
            sudo systemctl restart nginx
            
            # Run Laravel commands
            cd ${{ secrets.APP_DIR }}
            php artisan view:clear
            php artisan route:clear
            php artisan config:clear
            php artisan cache:clear
            php artisan migrate --force
            
            echo "Deployment completed successfully!"

      - name: Purge Cloudflare Cache
        if: success()
        env:
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          echo "Purging Cloudflare cache..."
          curl -s -X POST "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}'
