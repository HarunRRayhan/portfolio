name: Direct Deployment

on:
  push:
    branches: [ main, master, development, features/cicd ]
  pull_request:
    types: [ closed ]
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - development

env:
  ENVIRONMENT: ${{ github.event.inputs.environment || 'production' }}
  DEPLOY_TIMESTAMP: ${{ github.run_id }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    environment: ${{ github.event.inputs.environment || 'production' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build assets
        run: npm run build

      - name: Install SSH key
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "SSH connection successful"
            mkdir -p ${{ secrets.APP_DIR }}/public/build

      - name: Deploy to server
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "app,bootstrap,config,database,lang,public,resources,routes,storage,tests,vendor,artisan,composer.json,composer.lock,package.json,package-lock.json,vite.config.js,tailwind.config.js,postcss.config.js"
          target: "${{ secrets.APP_DIR }}"
          strip_components: 0

      - name: Deploy built assets
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "public/build/*"
          target: "${{ secrets.APP_DIR }}/public/build"
          strip_components: 2

      - name: Create .env and run Docker
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Create timestamp for unique container name
            TIMESTAMP=$(date +%Y%m%d%H%M%S)
            CONTAINER_NAME="portfolio-app-${TIMESTAMP}"
            
            # Create Laravel .env file
            cat > ${{ secrets.APP_DIR }}/.env << EOF
            APP_NAME="${{ secrets.APP_NAME }}"
            APP_ENV=${{ env.ENVIRONMENT }}
            APP_KEY=${{ secrets.APP_KEY }}
            APP_DEBUG=${{ env.ENVIRONMENT == 'production' && 'false' || 'true' }}
            APP_URL=${{ secrets.APP_URL }}
            
            LOG_CHANNEL=stack
            LOG_DEPRECATIONS_CHANNEL=null
            LOG_LEVEL=debug
            
            DB_CONNECTION=pgsql
            DB_HOST=localhost
            DB_PORT=5432
            DB_DATABASE=${{ secrets.POSTGRES_DB }}
            DB_USERNAME=${{ secrets.POSTGRES_USER }}
            DB_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            
            SESSION_DRIVER=file
            SESSION_LIFETIME=120
            
            CACHE_DRIVER=file
            QUEUE_CONNECTION=sync
            
            ASSET_URL=https://cdn.harun.dev
            EOF
            
            # Set up directories and permissions
            mkdir -p ${{ secrets.APP_DIR }}/storage/logs
            mkdir -p ${{ secrets.APP_DIR }}/storage/framework/{sessions,views,cache,cache/data}
            mkdir -p ${{ secrets.APP_DIR }}/bootstrap/cache
            chmod -R 777 ${{ secrets.APP_DIR }}/storage ${{ secrets.APP_DIR }}/bootstrap/cache
            touch ${{ secrets.APP_DIR }}/storage/logs/laravel.log
            chmod 666 ${{ secrets.APP_DIR }}/storage/logs/laravel.log
            
            # Stop and remove existing containers
            docker ps -q --filter name=portfolio-app | xargs -r docker stop
            docker ps -aq --filter name=portfolio-app | xargs -r docker rm
            
            # Start new container
            docker run -d --name ${CONTAINER_NAME} \
              -p 80:80 \
              -v ${{ secrets.APP_DIR }}:/var/www/html \
              -e WEB_DOCUMENT_ROOT=/var/www/html/public \
              -e PHP_MAX_EXECUTION_TIME=300 \
              -e PHP_POST_MAX_SIZE=50M \
              -e PHP_UPLOAD_MAX_FILESIZE=50M \
              -e DB_CONNECTION=pgsql \
              -e DB_HOST=localhost \
              -e DB_PORT=5432 \
              -e DB_DATABASE=${{ secrets.POSTGRES_DB }} \
              -e DB_USERNAME=${{ secrets.POSTGRES_USER }} \
              -e DB_PASSWORD=${{ secrets.POSTGRES_PASSWORD }} \
              --restart unless-stopped \
              --network=host \
              webdevops/php-nginx:8.2-alpine
            
            # Wait for container to start
            sleep 5
            
            # Fix permissions inside container
            docker exec ${CONTAINER_NAME} sh -c 'chown -R www-data:www-data /var/www/html/storage /var/www/html/bootstrap/cache'
            
            # Clear Laravel cache
            docker exec ${CONTAINER_NAME} sh -c 'cd /var/www/html && php artisan view:clear && php artisan route:clear && php artisan config:clear' || echo "Failed to clear cache"
            
            # Run migrations
            docker exec ${CONTAINER_NAME} sh -c 'cd /var/www/html && php artisan migrate --force' || echo "Failed to run migrations"
            
            # Verify container is running
            if docker ps | grep -q ${CONTAINER_NAME}; then
              echo "✅ Container ${CONTAINER_NAME} is running successfully"
              exit 0
            else
              echo "❌ Container ${CONTAINER_NAME} is not running"
              exit 1
            fi

      - name: Purge Cloudflare Cache
        if: success()
        env:
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          echo "Purging Cloudflare cache..."
          curl -s -X POST "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}'
