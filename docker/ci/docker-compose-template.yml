version: '3.8'

services:
  app:
    image: nginx:alpine
    container_name: portfolio-app-${TIMESTAMP}
    restart: unless-stopped
    volumes:
      - ${APP_DIR}:/var/www/html
      - ${APP_DIR}/docker/ci/nginx.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "8080:80"
    networks:
      - portfolio-network
  
  php:
    build:
      context: ${APP_DIR}/docker/ci
      dockerfile: Dockerfile.php
    container_name: portfolio-php-${TIMESTAMP}
    restart: unless-stopped
    volumes:
      - ${APP_DIR}:/var/www/html
      - ${APP_DIR}/docker/ci/entrypoint.sh:/entrypoint.sh
    networks:
      - portfolio-network

networks:
  portfolio-network:
    driver: bridge