version: '3.8'

services:
  app:
    image: nginx:alpine
    container_name: portfolio-app-${TIMESTAMP}
    restart: unless-stopped
    volumes:
      - ${APP_DIR}:/var/www/html
      - ${APP_DIR}/docker/ci/nginx.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "8080:80"
    networks:
      - portfolio-network
  
  php:
    image: php:8.2-fpm-alpine
    container_name: portfolio-php-${TIMESTAMP}
    restart: unless-stopped
    volumes:
      - ${APP_DIR}:/var/www/html
    networks:
      - portfolio-network
    command: >
      sh -c "cd /var/www/html && 
             apk add --no-cache git unzip libzip-dev zip libpng-dev icu-dev && 
             docker-php-ext-install pdo pdo_mysql zip gd intl && 
             if [ ! -f /var/www/html/vendor/autoload.php ]; then 
               curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer && 
               composer install --no-dev --optimize-autoloader --no-interaction; 
             fi && 
             mkdir -p /var/www/html/storage/framework/{sessions,views,cache,cache/data} && 
             chmod -R 777 /var/www/html/storage && 
             php-fpm"

networks:
  portfolio-network:
    driver: bridge