version: '3.8'

services:
  # Blue environment
  app-blue:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        - NODE_ENV=production
    volumes:
      - /opt/portfolio/.env:/var/www/html/.env
      - /opt/portfolio/storage:/var/www/html/storage
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=https://harun.dev
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=${POSTGRES_DB}
      - DB_USERNAME=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - VIEW_COMPILED_PATH=/var/www/html/storage/framework/views
      - CACHE_DRIVER=file
      - SESSION_DRIVER=file
      - QUEUE_CONNECTION=sync
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      replicas: ${MIN_APP_INSTANCES:-1}
      mode: replicated
      update_config:
        parallelism: 1
        order: start-first
      restart_policy:
        condition: on-failure
        max_attempts: 3
      placement:
        max_replicas_per_node: ${MAX_APP_INSTANCES:-2}
      resources:
        limits:
          cpus: ${MAX_APP_CPU_LIMIT:-0.8}
          memory: ${MAX_APP_MEMORY_LIMIT:-400M}
        reservations:
          cpus: ${APP_CPU_LIMIT:-0.6}
          memory: ${APP_MEMORY_LIMIT:-300M}
    networks:
      - app-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.app-blue.rule=Host(`harun.dev`)"
      - "traefik.http.routers.app-blue.entrypoints=websecure"
      - "traefik.http.routers.app-blue.tls=true"
      - "traefik.http.routers.app-blue.tls.certresolver=letsencrypt"
      - "traefik.http.services.app-blue.loadbalancer.server.port=80"
      - "environment=blue"

  # Green environment
  app-green:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        - NODE_ENV=production
    volumes:
      - /opt/portfolio/.env:/var/www/html/.env
      - /opt/portfolio/storage:/var/www/html/storage
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=https://harun.dev
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=${POSTGRES_DB}
      - DB_USERNAME=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - VIEW_COMPILED_PATH=/var/www/html/storage/framework/views
      - CACHE_DRIVER=file
      - SESSION_DRIVER=file
      - QUEUE_CONNECTION=sync
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      replicas: ${MIN_APP_INSTANCES:-1}
      mode: replicated
      update_config:
        parallelism: 1
        order: start-first
      restart_policy:
        condition: on-failure
        max_attempts: 3
      placement:
        max_replicas_per_node: ${MAX_APP_INSTANCES:-2}
      resources:
        limits:
          cpus: ${MAX_APP_CPU_LIMIT:-0.8}
          memory: ${MAX_APP_MEMORY_LIMIT:-400M}
        reservations:
          cpus: ${APP_CPU_LIMIT:-0.6}
          memory: ${APP_MEMORY_LIMIT:-300M}
    networks:
      - app-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.app-green.rule=Host(`harun.dev`)"
      - "traefik.http.routers.app-green.entrypoints=websecure"
      - "traefik.http.routers.app-green.tls=true"
      - "traefik.http.routers.app-green.tls.certresolver=letsencrypt"
      - "traefik.http.services.app-green.loadbalancer.server.port=80"
      - "environment=green"

  # Traefik reverse proxy for blue-green switching with Let's Encrypt
  traefik:
    image: traefik:v2.10
    command:
      - "--api.dashboard=true"
      - "--api.insecure=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.email=contact@harun.dev"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-certificates:/letsencrypt
    networks:
      - app-network
    depends_on:
      - app-blue
      - app-green
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`traefik.harun.dev`)"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard.entrypoints=websecure"
      - "traefik.http.routers.dashboard.tls=true"
      - "traefik.http.routers.dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.routers.dashboard.middlewares=auth"
      - "traefik.http.middlewares.auth.basicauth.users=admin:$$apr1$$talBPKvP$$1NOjjVx7r1e0D8PVvGyeZ1"

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: ${MAX_DB_CPU_LIMIT:-1.0}
          memory: ${MAX_DB_MEMORY_LIMIT:-600M}
        reservations:
          cpus: ${DB_CPU_LIMIT:-0.8}
          memory: ${DB_MEMORY_LIMIT:-450M}
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
  traefik-certificates:
