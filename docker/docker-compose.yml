version: '3.8'

services:
  # Blue environment
  app-blue:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    working_dir: /var/www/html
    volumes:
      - /opt/portfolio:/var/www/html
      - app_storage:/var/www/html/storage
    environment:
      - APP_ENV=production
      - APP_DEBUG=true
      - APP_URL=https://harun.dev
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=portfolio
      - DB_USERNAME=portfolio
      - DB_PASSWORD=password
      - VIEW_COMPILED_PATH=/var/www/html/storage/framework/views
      - CACHE_DRIVER=file
      - SESSION_DRIVER=file
      - QUEUE_CONNECTION=sync
      - FILESYSTEM_DISK=local
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: ${MAX_APP_CPU_LIMIT:-0.8}
          memory: ${MAX_APP_MEMORY_LIMIT:-400M}
        reservations:
          cpus: ${APP_CPU_LIMIT:-0.6}
          memory: ${APP_MEMORY_LIMIT:-300M}
    networks:
      - app-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.app-blue.rule=Host(`harun.dev`) || Host(`www.harun.dev`)"
      - "traefik.http.routers.app-blue.entrypoints=websecure"
      - "traefik.http.routers.app-blue.tls=true"
      - "traefik.http.routers.app-blue.tls.certresolver=letsencrypt"
      # Using PHP-FPM directly on port 9000
      - "traefik.http.services.app-blue.loadbalancer.server.port=9000"
      - "traefik.http.services.app-blue.loadbalancer.passHostHeader=true"
      - "traefik.http.middlewares.app-blue-www-redirect.redirectregex.regex=^https://www\\.harun\\.dev/(.*)"
      - "traefik.http.middlewares.app-blue-www-redirect.redirectregex.replacement=https://harun.dev/$${1}"
      - "traefik.http.middlewares.app-blue-www-redirect.redirectregex.permanent=true"
      - "traefik.http.routers.app-blue-www.rule=Host(`www.harun.dev`)"
      - "traefik.http.routers.app-blue-www.middlewares=app-blue-www-redirect"
      - "traefik.http.routers.app-blue-www.entrypoints=websecure"
      - "traefik.http.routers.app-blue-www.tls=true"
      - "traefik.http.routers.app-blue-www.tls.certresolver=letsencrypt"
      - "environment=blue"

  # Green environment
  app-green:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    working_dir: /var/www/html
    volumes:
      - /opt/portfolio:/var/www/html
      - app_storage:/var/www/html/storage
    environment:
      - APP_ENV=production
      - APP_DEBUG=true
      - APP_URL=https://harun.dev
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=portfolio
      - DB_USERNAME=portfolio
      - DB_PASSWORD=password
      - VIEW_COMPILED_PATH=/var/www/html/storage/framework/views
      - CACHE_DRIVER=file
      - SESSION_DRIVER=file
      - QUEUE_CONNECTION=sync
      - FILESYSTEM_DISK=local
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: ${MAX_APP_CPU_LIMIT:-0.8}
          memory: ${MAX_APP_MEMORY_LIMIT:-400M}
        reservations:
          cpus: ${APP_CPU_LIMIT:-0.6}
          memory: ${APP_MEMORY_LIMIT:-300M}
    networks:
      - app-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.app-green.rule=Host(`harun.dev`) || Host(`www.harun.dev`)"
      - "traefik.http.routers.app-green.entrypoints=websecure"
      - "traefik.http.routers.app-green.tls=true"
      - "traefik.http.routers.app-green.tls.certresolver=letsencrypt"
      # Using PHP-FPM directly on port 9000
      - "traefik.http.services.app-green.loadbalancer.server.port=9000"
      - "traefik.http.services.app-green.loadbalancer.passHostHeader=true"
      - "traefik.http.middlewares.app-green-www-redirect.redirectregex.regex=^https://www\\.harun\\.dev/(.*)"
      - "traefik.http.middlewares.app-green-www-redirect.redirectregex.replacement=https://harun.dev/$${1}"
      - "traefik.http.middlewares.app-green-www-redirect.redirectregex.permanent=true"
      - "traefik.http.routers.app-green-www.rule=Host(`www.harun.dev`)"
      - "traefik.http.routers.app-green-www.middlewares=app-green-www-redirect"
      - "traefik.http.routers.app-green-www.entrypoints=websecure"
      - "traefik.http.routers.app-green-www.tls=true"
      - "traefik.http.routers.app-green-www.tls.certresolver=myresolver"
      - "environment=green"

  # Traefik reverse proxy
  traefik:
    image: traefik:v2.10
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.myresolver.acme.httpchallenge=true"
      - "--certificatesresolvers.myresolver.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.myresolver.acme.email=harunrrayhan@gmail.com"
      - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "traefik-certificates:/letsencrypt"
    networks:
      - app-network
    depends_on:
      - app-blue
      - app-green
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`traefik.harun.dev`)"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard.entrypoints=websecure"
      - "traefik.http.routers.dashboard.tls=true"
      - "traefik.http.routers.dashboard.tls.certresolver=myresolver"
      - "traefik.http.routers.dashboard.middlewares=auth"
      - "traefik.http.middlewares.auth.basicauth.users=admin:$$apr1$$talBPKvP$$1NOjjVx7r1e0D8PVvGyeZ1"

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=portfolio
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=portfolio
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portfolio"]
      interval: 5s
      timeout: 5s
      retries: 10

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
  app_storage:
  traefik-certificates: