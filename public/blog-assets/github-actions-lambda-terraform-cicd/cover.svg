<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 840" role="img" aria-labelledby="title desc">
  <title id="title">CI/CD Pipeline for Lambda and Terraform with GitHub Actions</title>
  <desc id="desc">Dark technical illustration showing a GitHub Actions CI/CD pipeline deploying to AWS Lambda and Terraform infrastructure.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="lineFlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0"/>
      <stop offset="30%" stop-color="#3b82f6" stop-opacity="0.8"/>
      <stop offset="70%" stop-color="#8b5cf6" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1600" height="840" fill="url(#bg)"/>
  <rect width="1600" height="840" fill="url(#glow1)"/>

  <!-- Grid lines -->
  <g stroke="#1e3a5f" stroke-width="0.5" opacity="0.3">
    <line x1="0" y1="200" x2="1600" y2="200"/>
    <line x1="0" y1="400" x2="1600" y2="400"/>
    <line x1="0" y1="600" x2="1600" y2="600"/>
    <line x1="400" y1="0" x2="400" y2="840"/>
    <line x1="800" y1="0" x2="800" y2="840"/>
    <line x1="1200" y1="0" x2="1200" y2="840"/>
  </g>

  <!-- Stage 1: GitHub -->
  <g transform="translate(200, 340)">
    <rect x="-60" y="-60" width="120" height="120" rx="20" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
    <circle cx="0" cy="-10" r="22" fill="none" stroke="#3b82f6" stroke-width="2"/>
    <circle cx="-15" cy="-10" r="8" fill="none" stroke="#3b82f6" stroke-width="2"/>
    <circle cx="15" cy="-10" r="8" fill="none" stroke="#3b82f6" stroke-width="2"/>
    <text x="0" y="35" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="13" font-weight="600">PUSH</text>
  </g>

  <!-- Arrow 1 -->
  <g>
    <line x1="270" y1="400" x2="370" y2="400" stroke="url(#lineFlow)" stroke-width="3" marker-end="url(#arrowBlue)"/>
    <polygon points="370,394 385,400 370,406" fill="#3b82f6" opacity="0.8"/>
  </g>

  <!-- Stage 2: GitHub Actions -->
  <g transform="translate(500, 300)">
    <rect x="-80" y="-70" width="160" height="140" rx="16" fill="#1e293b" stroke="#6366f1" stroke-width="2"/>
    <!-- Runner icon -->
    <rect x="-30" y="-45" width="60" height="40" rx="6" fill="none" stroke="#818cf8" stroke-width="1.5"/>
    <line x1="-20" y1="-30" x2="20" y2="-30" stroke="#818cf8" stroke-width="1.5"/>
    <line x1="-20" y1="-20" x2="20" y2="-20" stroke="#818cf8" stroke-width="1.5"/>
    <circle cx="0" cy="-35" r="3" fill="#818cf8"/>
    <text x="0" y="10" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12" font-weight="600">ACTIONS</text>
    <!-- Steps -->
    <circle cx="-35" cy="35" r="4" fill="#6366f1"/>
    <circle cx="0" cy="35" r="4" fill="#6366f1"/>
    <circle cx="35" cy="35" r="4" fill="#6366f1"/>
  </g>

  <!-- Arrow 2 -->
  <line x1="590" y1="370" x2="680" y2="370" stroke="url(#lineFlow)" stroke-width="3" opacity="0.6"/>
  <polygon points="680,364 695,370 680,376" fill="#8b5cf6" opacity="0.6"/>

  <!-- Stage 3: Terraform -->
  <g transform="translate(800, 320)">
    <rect x="-70" y="-60" width="140" height="120" rx="16" fill="#1e293b" stroke="#8b5cf6" stroke-width="2"/>
    <!-- T icon -->
    <rect x="-25" y="-40" width="50" height="50" rx="4" fill="none" stroke="#a78bfa" stroke-width="1.5"/>
    <line x1="-15" y1="-25" x2="15" y2="-25" stroke="#a78bfa" stroke-width="2"/>
    <line x1="0" y1="-40" x2="0" y2="10" stroke="#a78bfa" stroke-width="2"/>
    <text x="0" y="35" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="13" font-weight="600">TERRAFORM</text>
  </g>

  <!-- Arrow 3 -->
  <line x1="880" y1="380" x2="970" y2="380" stroke="url(#lineFlow)" stroke-width="3" opacity="0.4"/>
  <polygon points="970,374 985,380 970,386" fill="#a78bfa" opacity="0.4"/>

  <!-- Stage 4: Lambda -->
  <g transform="translate(1100, 300)">
    <rect x="-80" y="-60" width="160" height="120" rx="16" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
    <!-- Lambda icon -->
    <path d="M-20,-30 L0,-30 L15,0 L30,-30" fill="none" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M-20,10 L0,10 L15,-20 L30,10 L45,10" fill="none" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
    <text x="0" y="40" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="13" font-weight="600">LAMBDA</text>
  </g>

  <!-- Pipeline line connecting all stages -->
  <path d="M120,400 Q160,340 200,400 Q240,460 280,400 Q320,340 360,400 Q400,460 440,400 Q480,340 520,400 Q560,460 600,400 Q640,340 680,400 Q720,460 760,400 Q800,340 840,400 Q880,460 920,400 Q960,340 1000,400 Q1040,460 1080,400 Q1120,340 1160,400 Q1200,460 1240,400 Q1280,340 1320,400"
        fill="none" stroke="#334155" stroke-width="1" stroke-dasharray="4,6" opacity="0.3"/>

  <!-- Decorative particles -->
  <g fill="#3b82f6" opacity="0.3">
    <circle cx="100" cy="180" r="2"/>
    <circle cx="350" cy="550" r="1.5"/>
    <circle cx="700" cy="200" r="2"/>
    <circle cx="1050" cy="600" r="1.5"/>
    <circle cx="1400" cy="250" r="2"/>
    <circle cx="1500" cy="500" r="1"/>
    <circle cx="450" cy="150" r="1.5"/>
    <circle cx="850" cy="650" r="1"/>
    <circle cx="1250" cy="180" r="2"/>
  </g>

  <!-- Bottom subtitle area -->
  <g transform="translate(0, 780)">
    <rect x="0" y="0" width="1600" height="1" fill="#1e3a5f" opacity="0.5"/>
  </g>
</svg>
