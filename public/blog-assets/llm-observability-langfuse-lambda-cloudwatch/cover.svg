<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">LLM observability cover</title>
  <desc id="desc">Dark technical illustration with logs, traces, and dashboards for AWS observability.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="55%" stop-color="#0c1f33"/>
      <stop offset="100%" stop-color="#10283f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1290" cy="180" r="210" fill="#1d4ed8" opacity="0.14"/>
  <circle cx="290" cy="720" r="250" fill="#14b8a6" opacity="0.10"/>
  <path d="M120 680 C 320 560, 480 760, 700 630 S 1080 520, 1460 620" fill="none" stroke="url(#accent)" stroke-width="10" opacity="0.55" filter="url(#glow)"/>
  <path d="M160 255 C 340 175, 470 350, 680 260 S 1100 150, 1440 250" fill="none" stroke="#38bdf8" stroke-width="6" opacity="0.4"/>
  <g opacity="0.95">
    <rect x="130" y="140" width="530" height="110" rx="22" fill="#0f2740" stroke="#38bdf8" stroke-opacity="0.35"/>
    <rect x="130" y="280" width="360" height="250" rx="22" fill="#0f2740" stroke="#38bdf8" stroke-opacity="0.25"/>
    <rect x="525" y="280" width="455" height="250" rx="22" fill="#0f2740" stroke="#38bdf8" stroke-opacity="0.25"/>
    <rect x="1010" y="280" width="460" height="250" rx="22" fill="#0f2740" stroke="#38bdf8" stroke-opacity="0.25"/>
  </g>
  <g font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" fill="#e2e8f0">
    <text x="180" y="198" font-size="34" font-weight="700">LLM Observability</text>
    <text x="180" y="236" font-size="20" fill="#93c5fd">Langfuse + Lambda + CloudWatch</text>
    <text x="180" y="336" font-size="24" fill="#93c5fd">Request ID</text>
    <text x="180" y="382" font-size="24" fill="#93c5fd">Trace ID</text>
    <text x="180" y="428" font-size="24" fill="#93c5fd">Tokens</text>
    <text x="180" y="474" font-size="24" fill="#93c5fd">Retries</text>
    <text x="575" y="336" font-size="24" fill="#93c5fd">Prompt Version</text>
    <text x="575" y="382" font-size="24" fill="#93c5fd">Model + Provider</text>
    <text x="575" y="428" font-size="24" fill="#93c5fd">Latency</text>
    <text x="575" y="474" font-size="24" fill="#93c5fd">Cost Spikes</text>
    <text x="1060" y="336" font-size="24" fill="#93c5fd">CloudWatch Logs</text>
    <text x="1060" y="382" font-size="24" fill="#93c5fd">Lambda Metrics</text>
    <text x="1060" y="428" font-size="24" fill="#93c5fd">Trace Replay</text>
    <text x="1060" y="474" font-size="24" fill="#93c5fd">Incident Triage</text>
  </g>
  <g opacity="0.8">
    <rect x="146" y="520" width="220" height="16" rx="8" fill="#22d3ee"/>
    <rect x="386" y="520" width="120" height="16" rx="8" fill="#f59e0b"/>
    <rect x="526" y="520" width="180" height="16" rx="8" fill="#22d3ee"/>
    <rect x="726" y="520" width="80" height="16" rx="8" fill="#f59e0b"/>
    <rect x="826" y="520" width="120" height="16" rx="8" fill="#22d3ee"/>
    <rect x="1018" y="520" width="170" height="16" rx="8" fill="#f59e0b"/>
    <rect x="1208" y="520" width="100" height="16" rx="8" fill="#22d3ee"/>
    <rect x="1328" y="520" width="110" height="16" rx="8" fill="#f59e0b"/>
  </g>
</svg>
