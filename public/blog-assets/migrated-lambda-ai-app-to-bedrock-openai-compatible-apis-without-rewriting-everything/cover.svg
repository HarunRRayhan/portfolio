<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 840" role="img" aria-labelledby="title desc">
  <title id="title">Migrating Lambda AI App to Bedrock OpenAI-Compatible APIs</title>
  <desc id="desc">Dark technical illustration showing migration of a Lambda AI application to AWS Bedrock with OpenAI-compatible APIs.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.08"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1600" height="840" fill="url(#bg)"/>
  <rect width="1600" height="840" fill="url(#glow1)"/>

  <!-- Grid -->
  <g stroke="#1e3a5f" stroke-width="0.5" opacity="0.25">
    <line x1="0" y1="210" x2="1600" y2="210"/>
    <line x1="0" y1="420" x2="1600" y2="420"/>
    <line x1="0" y1="630" x2="1600" y2="630"/>
    <line x1="533" y1="0" x2="533" y2="840"/>
    <line x1="1066" y1="0" x2="1066" y2="840"/>
  </g>

  <!-- Left: Old Lambda -->
  <g transform="translate(300, 360)">
    <rect x="-100" y="-70" width="200" height="140" rx="20" fill="#1e293b" stroke="#64748b" stroke-width="2"/>
    <!-- Lambda λ symbol -->
    <path d="M-15,-35 L5,-35 L20,0 L35,-35" fill="none" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Old OpenAI-style API -->
    <rect x="-65" y="15" width="130" height="28" rx="6" fill="#334155"/>
    <text x="0" y="33" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="11" font-weight="600">OpenAI SDK</text>
    <text x="0" y="-45" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12" font-weight="600">BEFORE</text>
  </g>

  <!-- Arrow: Migration -->
  <g transform="translate(500, 360)">
    <!-- Dashed path -->
    <path d="M0,0 L100,0" stroke="#f59e0b" stroke-width="3" stroke-dasharray="6,4" fill="none"/>
    <polygon points="100,-6 116,0 100,6" fill="#f59e0b"/>
    <!-- Circular arrow overlay -->
    <path d="M30,-20 A25,25 0 0,1 70,-20" stroke="#f59e0b" stroke-width="2" fill="none" stroke-dasharray="3,3" opacity="0.5"/>
    <polygon points="70,-26 78,-20 70,-14" fill="#f59e0b" opacity="0.5"/>
  </g>

  <!-- Center: Bedrock -->
  <g transform="translate(800, 320)">
    <rect x="-100" y="-80" width="200" height="160" rx="20" fill="#1e293b" stroke="#f59e0b" stroke-width="2.5" filter="url(#glow)"/>
    <!-- Bedrock mountain icon -->
    <path d="M-40,-10 L-10,-50 L20,-10 L35,-30 L50,-10" fill="none" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- API badge -->
    <rect x="-55" y="15" width="110" height="28" rx="6" fill="#f59e0b" fill-opacity="0.15" stroke="#fbbf24" stroke-width="1"/>
    <text x="0" y="33" text-anchor="middle" fill="#fbbf24" font-family="system-ui, sans-serif" font-size="10" font-weight="700">OpenAI-Compatible</text>
    <text x="0" y="-55" text-anchor="middle" fill="#fbbf24" font-family="system-ui, sans-serif" font-size="12" font-weight="700">BEDROCK</text>
  </g>

  <!-- Arrow to right -->
  <g transform="translate(1000, 380)">
    <line x1="0" y1="0" x2="80" y2="0" stroke="#3b82f6" stroke-width="2.5" stroke-dasharray="5,3"/>
    <polygon points="80,-5 92,0 80,5" fill="#3b82f6"/>
  </g>

  <!-- Right: New Lambda -->
  <g transform="translate(1200, 360)">
    <rect x="-90" y="-70" width="180" height="140" rx="20" fill="#1e293b" stroke="#22c55e" stroke-width="2"/>
    <path d="M-15,-35 L5,-35 L20,0 L35,-35" fill="none" stroke="#4ade80" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="-55" y="15" width="110" height="28" rx="6" fill="#166534"/>
    <text x="0" y="33" text-anchor="middle" fill="#86efac" font-family="system-ui, sans-serif" font-size="10" font-weight="600">Same Code ✓</text>
    <text x="0" y="-45" text-anchor="middle" fill="#86efac" font-family="system-ui, sans-serif" font-size="12" font-weight="600">AFTER</text>
  </g>

  <!-- Decorative nodes -->
  <g opacity="0.25">
    <circle cx="150" cy="200" r="2" fill="#f59e0b"/>
    <circle cx="400" cy="600" r="1.5" fill="#f59e0b"/>
    <circle cx="900" cy="180" r="2" fill="#f59e0b"/>
    <circle cx="1100" cy="650" r="1.5" fill="#3b82f6"/>
    <circle cx="1450" cy="200" r="2" fill="#22c55e"/>
    <circle cx="300" cy="150" r="1" fill="#f59e0b"/>
    <circle cx="750" cy="580" r="1.5" fill="#f59e0b"/>
    <circle cx="1350" cy="580" r="1" fill="#22c55e"/>
  </g>

  <!-- "Works without rewriting" message -->
  <g transform="translate(800, 720)">
    <rect x="0" y="0" width="1600" height="1" fill="#1e3a5f" opacity="0.5"/>
  </g>
</svg>
