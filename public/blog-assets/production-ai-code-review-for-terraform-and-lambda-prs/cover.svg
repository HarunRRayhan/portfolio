<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 840" role="img" aria-labelledby="title desc">
  <title id="title">AI Code Review for Terraform and Lambda PRs</title>
  <desc id="desc">Dark technical illustration showing AI-assisted code review for Terraform and AWS Lambda pull requests.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0.05"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1600" height="840" fill="url(#bg)"/>
  <rect width="1600" height="840" fill="url(#glow1)"/>

  <!-- Grid -->
  <g stroke="#1e3a5f" stroke-width="0.5" opacity="0.3">
    <line x1="0" y1="200" x2="1600" y2="200"/>
    <line x1="0" y1="400" x2="1600" y2="400"/>
    <line x1="0" y1="600" x2="1600" y2="600"/>
    <line x1="400" y1="0" x2="400" y2="840"/>
    <line x1="800" y1="0" x2="800" y2="840"/>
    <line x1="1200" y1="0" x2="1200" y2="840"/>
  </g>

  <!-- Left: PR / Code Input -->
  <g transform="translate(250, 340)">
    <rect x="-90" y="-80" width="180" height="160" rx="18" fill="#1e293b" stroke="#6366f1" stroke-width="2"/>
    <!-- PR icon -->
    <rect x="-55" y="-55" width="110" height="40" rx="6" fill="none" stroke="#818cf8" stroke-width="1.5"/>
    <line x1="-40" y1="-45" x2="40" y2="-45" stroke="#818cf8" stroke-width="1.5"/>
    <line x1="-40" y1="-35" x2="20" y2="-35" stroke="#818cf8" stroke-width="1.5"/>
    <line x1="-40" y1="-25" x2="40" y2="-25" stroke="#818cf8" stroke-width="1.5"/>
    <circle cx="0" cy="-50" r="4" fill="#818cf8"/>
    <text x="0" y="10" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12" font-weight="600">Pull Request</text>
    <!-- Code lines -->
    <line x1="-50" y1="30" x2="50" y2="30" stroke="#475569" stroke-width="2"/>
    <line x1="-35" y1="42" x2="45" y2="42" stroke="#475569" stroke-width="2" stroke-dasharray="3,2"/>
    <line x1="-50" y1="54" x2="25" y2="54" stroke="#475569" stroke-width="2"/>
  </g>

  <!-- Center: AI Review Engine -->
  <g transform="translate(800, 300)">
    <!-- Glow behind -->
    <circle cx="0" cy="0" r="110" fill="#6366f1" opacity="0.05"/>
    <circle cx="0" cy="0" r="90" fill="#6366f1" opacity="0.08"/>
    
    <rect x="-80" y="-80" width="160" height="160" rx="80" fill="#1e293b" stroke="#22c55e" stroke-width="2.5" filter="url(#glow)"/>
    <!-- Sparkle AI icon -->
    <circle cx="-8" cy="-15" r="6" fill="#4ade80" opacity="0.6"/>
    <circle cx="12" cy="-8" r="4" fill="#4ade80" opacity="0.4"/>
    <circle cx="-15" cy="8" r="3" fill="#4ade80" opacity="0.3"/>
    <!-- Checkmark -->
    <path d="M-12,-5 L-3,6 L15,-15" fill="none" stroke="#22c55e" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="0" y="45" text-anchor="middle" fill="#86efac" font-family="system-ui, sans-serif" font-size="13" font-weight="700">AI REVIEW</text>
  </g>

  <!-- Arrow left to center -->
  <line x1="350" y1="380" x2="630" y2="350" stroke="#6366f1" stroke-width="2.5" stroke-dasharray="6,3"/>
  <polygon points="630,344 645,348 630,356" fill="#6366f1"/>

  <!-- Right: Terraform + Lambda -->
  <g transform="translate(1200, 360)">
    <rect x="-100" y="-80" width="200" height="160" rx="18" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
    <!-- Terraform T -->
    <rect x="-75" y="-55" width="55" height="45" rx="4" fill="none" stroke="#60a5fa" stroke-width="1.5"/>
    <line x1="-65" y1="-45" x2="-30" y2="-45" stroke="#60a5fa" stroke-width="2"/>
    <line x1="-47" y1="-55" x2="-47" y2="-10" stroke="#60a5fa" stroke-width="2"/>
    <text x="-47" y="5" text-anchor="middle" fill="#60a5fa" font-family="system-ui, sans-serif" font-size="9" font-weight="600">TF</text>
    <!-- Lambda λ -->
    <g transform="translate(20, -30)">
      <path d="M-15,-25 L0,-25 L12,0 L24,-25" fill="none" stroke="#93c5fd" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <text x="30" y="5" text-anchor="middle" fill="#93c5fd" font-family="system-ui, sans-serif" font-size="9" font-weight="600">λ</text>
    <!-- Findings -->
    <rect x="-75" y="25" width="150" height="35" rx="8" fill="#1e3a5f" stroke="#475569" stroke-width="1"/>
    <circle cx="-55" cy="42" r="3" fill="#f59e0b"/>
    <text x="-42" y="46" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">IAM risk detected</text>
    <circle cx="5" cy="42" r="3" fill="#22c55e"/>
    <text x="18" y="46" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">3 passes</text>
  </g>

  <!-- Arrow center to right -->
  <line x1="890" y1="380" x2="1080" y2="380" stroke="#22c55e" stroke-width="2.5" stroke-dasharray="6,3"/>
  <polygon points="1080,374 1096,380 1080,386" fill="#22c55e"/>

  <!-- Decorative -->
  <g opacity="0.2" fill="#6366f1">
    <circle cx="100" cy="200" r="2"/>
    <circle cx="700" cy="600" r="1.5"/>
    <circle cx="1300" cy="200" r="2"/>
    <circle cx="500" cy="150" r="1.5"/>
    <circle cx="1000" cy="650" r="1"/>
    <circle cx="250" cy="600" r="1.5"/>
  </g>
</svg>
