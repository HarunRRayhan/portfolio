<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="7" fill="#1f1f1f"/>
  <!-- gear teeth (radial lines) -->
  <g stroke="#DC2626" stroke-width="2.5" stroke-linecap="round">
    <line x1="16" y1="3" x2="16" y2="7"/>
    <line x1="16" y1="25" x2="16" y2="29"/>
    <line x1="3" y1="16" x2="7" y2="16"/>
    <line x1="25" y1="16" x2="29" y2="16"/>
    <line x1="6.5" y1="6.5" x2="9.5" y2="9.5"/>
    <line x1="22.5" y1="22.5" x2="25.5" y2="25.5"/>
    <line x1="25.5" y1="6.5" x2="22.5" y2="9.5"/>
    <line x1="9.5" y1="22.5" x2="6.5" y2="25.5"/>
  </g>
  <!-- gear body -->
  <circle cx="16" cy="16" r="6" fill="#DC2626"/>
  <!-- center hole -->
  <circle cx="16" cy="16" r="2" fill="#1f1f1f"/>
</svg>
